<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earth Curvature Demo</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div id="controls">
    <label>Distance to target (km)</label>
    <input type="range" id="distanceSlider" min="1" max="100" value="10">
    <span id="distanceValue">10 km</span>

    <label>Observer height (m)</label>
    <input type="range" id="heightSlider" min="1" max="200" value="10">
    <span id="heightValue">10 m</span>
</div>

<canvas id="viewCanvas"></canvas>

<script src="script.js?v=2"></script>
</body>
</html>
