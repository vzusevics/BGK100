<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earth Curvature Visibility Tool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Earth Curvature Visibility Tool</h1>

    <div id="controls">
        <label>Distance to target (km)</label>
        <input type="range" id="distanceSlider" min="1" max="200" value="10">
        <span id="distanceValue">10 km</span>


        <label>Observer height (m)</label>
        <input type="range" id="heightSlider" min="0" max="3000" value="10">
        <span id="heightValue">10 m</span>
    </div>

    <canvas id="viewport"></canvas>

    <script src="script.js"></script>
</body>
</html>
