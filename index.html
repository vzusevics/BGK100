<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earth Curvature Demo</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div id="controls">
    <label>Taizels jūrā (km) kilometru</label>
    <input type="range" id="distanceSlider" min="1" max="50" step="0.1" value="1">
    <span id="distanceValue">10 km</span>

    <label>Sievas augstums virs jūras līmeņa (m) metru</label>
    <input type="range" id="heightSlider" min="1" max="105" step=0.5 value="10">
    <span id="heightValue">10 m</span>
</div>

<canvas id="viewCanvas"></canvas>
<!-- Edu panel -->
<div id="educationPanel">
    <img src="assets/img/education_panel.svg" alt="Educational Panel" id="eduImage">
</div>
<script src="script.js?v=3"></script>
</body>
</html>
